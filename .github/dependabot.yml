version: 2
updates:
  # Keep the Node.js runtime version (read by all workflows and Dockerfile) up to date.
  - package-ecosystem: "node-version"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep all npm deps (including minor/patch) up to date.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    versioning-strategy: "increase"

  # Keep GitHub Actions versions up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep Docker base images (Dockerfile + docker-compose.yml) up to date.
  # Images must be hardcoded version tags — variable expansions are not tracked.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Bump all four Jitsi services together so they stay on the same release.
      jitsi:
        patterns:
          - "jitsi/*"

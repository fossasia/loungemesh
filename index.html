<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowspace — Spatial video lounge for online events</title>
    <meta
      name="description"
      content="Flowspace is a spatial video lounge for informal online events — move freely around the room and talk to whoever's nearby, with shared notes, whiteboard, polls and reactions."
    />
    <meta name="theme-color" content="#4f6ef7" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://flowspace.eventyay.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / social sharing previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Flowspace" />
    <meta property="og:title" content="Flowspace — Spatial video lounge for online events" />
    <meta
      property="og:description"
      content="Move freely around a virtual room and talk to whoever's nearby. Shared notes, whiteboard, polls and reactions built in."
    />
    <meta property="og:url" content="https://flowspace.eventyay.com/" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Flowspace — Spatial video lounge for online events" />
    <meta
      name="twitter:description"
      content="Move freely around a virtual room and talk to whoever's nearby. Shared notes, whiteboard, polls and reactions built in."
    />
    <!--
      lib-jitsi-meet is NOT bundled as a static file. It is served at runtime by
      the jitsi-web container (same image/tag as the JVB), proxied same-origin at
      /libs/ by nginx (prod) / Vite (dev). This guarantees the client library
      always matches the running bridge, so bumping the jitsi image tag can never
      leave a stale copy behind. The modern build needs no external jQuery.
    -->
    <script src="/libs/lib-jitsi-meet.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src-vue/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Spatial video lounge for informal online events — move freely, talk to whoever's nearby." />
    <meta name="theme-color" content="#4f6ef7" />
    <title>Flowspace</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!--
      lib-jitsi-meet is NOT bundled as a static file. It is served at runtime by
      the jitsi-web container (same image/tag as the JVB), proxied same-origin at
      /libs/ by nginx (prod) / Vite (dev). This guarantees the client library
      always matches the running bridge, so bumping the jitsi image tag can never
      leave a stale copy behind. The modern build needs no external jQuery.
    -->
    <script src="/libs/lib-jitsi-meet.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src-vue/main.ts"></script>
  </body>
</html>
